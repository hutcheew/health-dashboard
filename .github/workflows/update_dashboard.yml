on:
  schedule:
    # Melbourne has no fixed UTC offset (AEST = UTC+10, Oct-Apr AEDT = UTC+11),
    # but cron only understands UTC. Each desired Melbourne time needs two
    # entries -- one per offset -- with a guard step below picking the real
    # one and skipping the other as a no-op.
    - cron: '15 0 * * *'    # 10:15am AEST  (UTC+10, ~Apr-Oct)
    - cron: '15 23 * * *'   # 10:15am AEDT  (UTC+11, ~Oct-Apr) -- fires 23:15 UTC previous day
    - cron: '0 10 * * *'    # 8:00pm AEST
    - cron: '0 9 * * *'     # 8:00pm AEDT
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this cron matches current Melbourne DST state
        id: gate
        env:
          # The literal cron expression that triggered this run -- fixed at
          # schedule-definition time, NOT dependent on when GitHub actually
          # executes the job. GitHub Actions cron is best-effort and can be
          # delayed by hours under load; a wall-clock check (e.g. "is it
          # between 10:00 and 10:30 right now") breaks under that delay,
          # since a legitimately-correct firing can execute well outside
          # its intended window. Comparing cron identity to the CURRENT
          # real DST offset is delay-proof: it doesn't matter when GitHub
          # runs the job, only whether AEST/AEDT actually changed since the
          # job was scheduled -- which happens twice a year, not hourly.
          FIRED_CRON: ${{ github.event.schedule }}
        run: |
          now_offset=$(TZ='Australia/Melbourne' date +%z)
          echo "Fired cron: '$FIRED_CRON'   Current Melbourne UTC offset: $now_offset"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manually triggered -- bypassing the time gate."
            exit 0
          fi

          case "$FIRED_CRON" in
            "15 0 * * *"|"0 10 * * *")
              expected="+1000"   # this cron line assumes AEST
              ;;
            "15 23 * * *"|"0 9 * * *")
              expected="+1100"   # this cron line assumes AEDT
              ;;
            *)
              expected=""
              ;;
          esac

          if [[ -z "$expected" ]]; then
            # Missing/unrecognized schedule context -- fail OPEN. An extra
            # run costs a few minutes of Action time; a silently skipped
            # run costs a missing day of real data.
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Could not determine which cron fired -- running anyway rather than risk a silent skip."
          elif [[ "$now_offset" == "$expected" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Cron assumes $expected and current offset is $now_offset -- match, proceeding (regardless of any scheduling delay)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Cron assumes $expected but current offset is $now_offset -- this is the other season's disambiguation pair, skipping."
          fi
      - name: Checkout repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          pip install garminconnect withings-api requests python-dotenv PyNaCl numpy
      - name: Write token files
        if: steps.gate.outputs.run == 'true'
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          WITHINGS_TOKENS: ${{ secrets.WITHINGS_TOKENS }}
        run: |
          mkdir -p ~/.garminconnect ~/.withings
          echo "$GARMIN_TOKENS"  > ~/.garminconnect/garmin_tokens.json
          echo "$WITHINGS_TOKENS" > ~/.withings/withings_tokens.json
      - name: Refresh Withings token
        if: steps.gate.outputs.run == 'true'
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python refresh_withings_token.py
      - name: Generate dashboard
        if: steps.gate.outputs.run == 'true'
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REDIRECT_URI: http://localhost:8080
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          INTERVALS_ATHLETE_ID: i416094
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python health_dashboard.py

      - name: Commit and push
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp health_dashboard.html index.html

          git add index.html

          if [ -f score_history.json ]; then
            git add score_history.json
          fi

          git commit -m "Dashboard update $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"

          git pull --rebase --autostash

          git push
