name: Update Health Dashboard

on:
  schedule:
    - cron: '48 23 * * *'   # 9:48am Melbourne AEST (23:48 UTC) — main morning trigger
    - cron: '59 23 * * *'   # 9:59am Melbourne AEST (23:59 UTC) — retry if delayed
    - cron: '05 0 * * *'    # 10:05am Melbourne AEST (00:05 UTC) — guaranteed Garmin data
    - cron: '0 9 * * *'     # 7:00pm Melbourne AEST (09:00 UTC) — afternoon post-run update
    - cron: '0 10 * * *'     # 8:00pm Melbourne AEST (10:00 UTC) — afternoon post-run update

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install garminconnect withings-api requests python-dotenv PyNaCl

      - name: Write token files
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          WITHINGS_TOKENS: ${{ secrets.WITHINGS_TOKENS }}
        run: |
          mkdir -p ~/.garminconnect ~/.withings
          echo "$GARMIN_TOKENS"  > ~/.garminconnect/garmin_tokens.json
          echo "$WITHINGS_TOKENS" > ~/.withings/withings_tokens.json

      - name: Generate dashboard
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REDIRECT_URI: http://localhost:8080
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERVALS_ATHLETE_ID: i416094
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python health_dashboard.py

      - name: Refresh Withings token
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python refresh_withings_token.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp health_dashboard.html index.html
          echo "<!-- updated: $(date +'%Y-%m-%d %H:%M:%S') -->" >> index.html
          git add index.html
          git commit -m "Dashboard update $(date +'%Y-%m-%d %H:%M')"
          git push
